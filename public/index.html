<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>жДПењГCode - yxcode</title>
<link rel="stylesheet" href="/vendor/github-dark.min.css">
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/highlight.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
  --fg: #e6edf3; --fg2: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --red: #f85149; --orange: #d29922; --violet: #a371f7; --blue: #58a6ff;
  --border: #30363d; --radius: 8px;
}
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); height: 100vh; }
#app { display: flex; flex-direction: row; height: 100vh; }
#mainArea { flex:1; display:flex; flex-direction:column; min-width:0; }

/* Header */
#header { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:var(--bg2); border-bottom:1px solid var(--border); gap:12px; flex-wrap:wrap; }
.header-left { display:flex; align-items:center; gap:8px; }
.logo { font-size:18px; font-weight:700; color:var(--accent); }
.version { font-size:12px; color:var(--fg2); }
.header-center { display:flex; gap:8px; }
.header-right { display:flex; align-items:center; gap:8px; }
.cwd-label { font-size:12px; color:var(--fg2); white-space:nowrap; }
select, #cwdInput { background:var(--bg3); color:var(--fg); border:1px solid var(--border); border-radius:var(--radius); padding:4px 8px; font-size:13px; outline:none; }
#cwdInput { width:240px; }
select:focus, #cwdInput:focus { border-color:var(--accent); }

/* Custom model select with icons */
.model-select-wrapper { position:relative; display:inline-block; }
.model-select-display { background:var(--bg3); color:var(--fg); border:1px solid var(--border); border-radius:var(--radius); padding:4px 8px 4px 32px; font-size:13px; cursor:pointer; min-width:280px; display:flex; align-items:center; position:relative; }
.model-select-display:hover { border-color:var(--accent); }
.model-select-display .model-icon { position:absolute; left:6px; width:20px; height:20px; border-radius:50%; object-fit:cover; }
.model-select-display .model-arrow { margin-left:auto; font-size:10px; color:var(--fg2); }
.model-select-dropdown { position:absolute; top:100%; left:0; right:0; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); margin-top:4px; max-height:300px; overflow-y:auto; z-index:100; display:none; box-shadow:0 4px 12px rgba(0,0,0,.3); }
.model-select-dropdown.visible { display:block; }
.model-select-option { display:flex; align-items:center; gap:8px; padding:6px 8px; cursor:pointer; font-size:13px; }
.model-select-option:hover { background:var(--bg3); }
.model-select-option .model-icon { width:20px; height:20px; border-radius:50%; object-fit:cover; flex-shrink:0; }
.model-select-option .model-label { flex:1; }
.model-select-option .model-provider { font-size:11px; color:var(--fg2); }

/* Switch toggle */
.switch-wrapper { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.switch { position:relative; display:inline-block; width:44px; height:24px; }
.switch input { opacity:0; width:0; height:0; }
.switch-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:var(--bg3); border:1px solid var(--border); transition:.3s; border-radius:24px; }
.switch-slider:before { position:absolute; content:""; height:16px; width:16px; left:3px; bottom:3px; background:var(--fg2); transition:.3s; border-radius:50%; }
.switch input:checked + .switch-slider { background:#ff69b4; border-color:#ff69b4; }
.switch input:checked + .switch-slider:before { transform:translateX(20px); background:#fff; }
.switch-label { font-size:13px; color:var(--fg); }
.status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.status-dot.online { background:var(--green); }
.status-dot.offline { background:var(--red); }
.status-dot.busy { background:var(--orange); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Chat */
#chatArea { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; }
#messages { flex:1; display:flex; flex-direction:column; gap:12px; }

/* Messages */
.msg { padding:12px 16px; border-radius:var(--radius); max-width:95%; word-wrap:break-word; }
.msg.user { background:#1c3a5f; align-self:flex-end; border:1px solid #264d7a; }
.msg.assistant { background:var(--bg2); align-self:flex-start; border:1px solid var(--border); width:100%; }
.msg .role { font-size:11px; font-weight:600; color:var(--fg2); margin-bottom:4px; text-transform:uppercase; }
.msg .content { font-size:14px; line-height:1.6; }
.msg .content p { margin:.4em 0; }
.msg .content pre { background:#0d1117; border:1px solid var(--border); border-radius:6px; padding:12px; overflow-x:auto; margin:8px 0; }
.msg .content code { font-family:'Cascadia Code','Fira Code',monospace; font-size:13px; }
.msg .content :not(pre)>code { background:var(--bg3); padding:2px 6px; border-radius:4px; }
.msg .content ul,.msg .content ol { padding-left:1.5em; }
.msg .content table { border-collapse:collapse; margin:8px 0; }
.msg .content th,.msg .content td { border:1px solid var(--border); padding:6px 10px; }
.msg .content blockquote { border-left:3px solid var(--accent); padding-left:12px; color:var(--fg2); margin:8px 0; }
/* Tool cards - category colors */
.tool-card { background:var(--bg); border:1px solid var(--border); border-radius:6px; margin:8px 0; overflow:hidden; border-left:3px solid var(--fg2); }
.tool-card[data-cat="bash"] { border-left-color:var(--green); }
.tool-card[data-cat="edit"] { border-left-color:var(--orange); }
.tool-card[data-cat="search"] { border-left-color:var(--fg2); }
.tool-card[data-cat="todo"],.tool-card[data-cat="task"] { border-left-color:var(--violet); }
.tool-card[data-cat="question"] { border-left-color:var(--blue); }
.tool-card[data-cat="agent"] { border-left-color:#bc8cff; }
.tool-header { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--bg3); cursor:pointer; font-size:13px; font-weight:600; }
.tool-header .tool-icon { font-size:14px; }
.tool-header .tool-name { color:var(--green); }
.tool-header .tool-summary { color:var(--fg2); font-weight:400; font-size:12px; margin-left:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.tool-header .chevron { color:var(--fg2); font-size:12px; margin-left:auto; transition:transform .2s; }
.tool-card.open .chevron { transform:rotate(180deg); }
.tool-body { padding:10px 12px; font-size:13px; display:none; }
.tool-card.open .tool-body { display:block; }
.tool-body pre { margin:0; white-space:pre-wrap; }
.tool-result { border-top:1px solid var(--border); padding:8px 12px; font-size:12px; color:var(--fg2); }
.tool-result.error { color:var(--red); }

/* Diff display */
.diff-view { font-family:'Cascadia Code','Fira Code',monospace; font-size:12px; line-height:1.5; }
.diff-file { color:var(--fg2); margin-bottom:8px; font-weight:600; }
.diff-line { padding:2px 8px; white-space:pre-wrap; word-break:break-all; }
.diff-line.removed { background:#3d1f1f; color:#ff7b72; }
.diff-line.removed::before { content:'- '; color:#ff7b72; font-weight:bold; }
.diff-line.added { background:#1a3a1a; color:#7ee787; }
.diff-line.added::before { content:'+ '; color:#7ee787; font-weight:bold; }
.diff-line.context { color:var(--fg2); }
.diff-line.context::before { content:'  '; }

/* AskUserQuestion panel */
.ask-panel { background:var(--bg2); border:1px solid var(--blue); border-radius:var(--radius); padding:16px; margin:8px 0; }
.ask-panel .ask-q { font-size:15px; font-weight:600; margin-bottom:12px; color:var(--fg); }
.ask-panel .ask-header { font-size:11px; color:var(--accent); text-transform:uppercase; font-weight:700; margin-bottom:4px; }
.ask-opts { display:flex; flex-direction:column; gap:6px; }
.ask-opt { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; background:var(--bg3); border:2px solid transparent; border-radius:var(--radius); cursor:pointer; transition:border-color .15s; }
.ask-opt:hover { border-color:var(--accent); }
.ask-opt.selected { border-color:var(--accent); background:#1c2d4a; }
.ask-opt .opt-radio { width:18px; height:18px; border-radius:50%; border:2px solid var(--fg2); flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; }
.ask-opt.selected .opt-radio { border-color:var(--accent); }
.ask-opt.selected .opt-radio::after { content:''; width:10px; height:10px; border-radius:50%; background:var(--accent); }
.ask-opt.multi .opt-radio { border-radius:4px; }
.ask-opt.multi.selected .opt-radio::after { border-radius:2px; }
.ask-opt .opt-label { font-size:14px; font-weight:600; }
.ask-opt .opt-desc { font-size:12px; color:var(--fg2); margin-top:2px; }
.ask-other { margin-top:8px; }
.ask-other input { width:100%; background:var(--bg3); color:var(--fg); border:1px solid var(--border); border-radius:var(--radius); padding:8px 12px; font-size:14px; outline:none; }
.ask-other input:focus { border-color:var(--accent); }
.ask-btns { display:flex; gap:8px; margin-top:12px; }
.ask-answered { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:12px; margin:8px 0; }
.ask-answered .ans-q { font-size:13px; color:var(--fg2); margin-bottom:4px; }
.ask-answered .ans-v { display:inline-block; background:#1c2d4a; color:var(--accent); padding:2px 10px; border-radius:12px; font-size:13px; margin:2px 4px 2px 0; }

/* Todo list */
.todo-list { margin:8px 0; }
.todo-item { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13px; border-bottom:1px solid var(--border); }
.todo-item:last-child { border-bottom:none; }
.todo-icon { font-size:16px; flex-shrink:0; }
.todo-icon.done { color:var(--green); }
.todo-icon.progress { color:var(--orange); }
.todo-icon.pending { color:var(--fg2); }
.todo-text { flex:1; }
.todo-priority { font-size:11px; padding:1px 6px; border-radius:8px; font-weight:600; }
.todo-priority.high { background:#3d1f1f; color:var(--red); }
.todo-priority.medium { background:#3d2f0f; color:var(--orange); }
.todo-priority.low { background:var(--bg3); color:var(--fg2); }

/* Task list */
.task-list { margin:8px 0; }
.task-progress { height:6px; background:var(--bg3); border-radius:3px; margin-bottom:8px; overflow:hidden; }
.task-progress-bar { height:100%; background:var(--green); border-radius:3px; transition:width .3s; }
.task-item { display:flex; align-items:center; gap:8px; padding:5px 0; font-size:13px; }
.task-status { font-size:11px; padding:1px 8px; border-radius:8px; font-weight:600; }
.task-status.completed { background:#1a3a1a; color:var(--green); }
.task-status.in_progress { background:#3d2f0f; color:var(--orange); }
.task-status.pending { background:var(--bg3); color:var(--fg2); }

/* Permission banner */
#permBanner { position:sticky; bottom:0; background:#1a1a2e; border:1px solid var(--orange); border-radius:var(--radius); padding:12px 16px; margin-top:8px; }
#permBanner.hidden { display:none; }
.perm-title { font-weight:600; color:var(--orange); margin-bottom:6px; }
.perm-tool { font-size:13px; color:var(--fg); margin-bottom:4px; }
.perm-rule { font-size:12px; color:var(--fg2); font-family:monospace; background:var(--bg); padding:4px 8px; border-radius:4px; display:inline-block; margin:4px 0; }
.perm-input-detail { font-size:12px; color:var(--fg2); background:var(--bg); padding:8px; border-radius:4px; margin:6px 0; max-height:120px; overflow-y:auto; white-space:pre-wrap; font-family:monospace; }
.perm-btns { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
.perm-btns button { padding:6px 16px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; }
.btn-allow { background:var(--green); color:#000; }
.btn-allow-remember { background:#238636; color:#fff; }
.btn-deny { background:var(--red); color:#fff; }

/* Input area */
#inputArea { padding:12px 16px; background:var(--bg2); border-top:1px solid var(--border); position:relative; }
.cmd-dropdown { display:none; position:absolute; bottom:100%; left:16px; right:16px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); max-height:240px; overflow-y:auto; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.4); }
.cmd-dropdown.visible { display:block; }
.cmd-dropdown-item { display:flex; align-items:center; gap:10px; padding:8px 12px; cursor:pointer; font-size:13px; }
.cmd-dropdown-item:hover, .cmd-dropdown-item.active { background:var(--bg3); }
.cmd-dropdown-item .cmd-icon { font-size:14px; width:20px; text-align:center; flex-shrink:0; color:var(--fg2); }
.cmd-dropdown-item .cmd-label { font-weight:600; color:var(--fg); }
.cmd-dropdown-item .cmd-desc { color:var(--fg2); font-size:12px; margin-left:auto; }
.input-row { display:flex; gap:8px; }
#promptInput { flex:1; background:var(--bg3); color:var(--fg); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; font-size:14px; resize:none; font-family:inherit; outline:none; }
#promptInput:focus { border-color:var(--accent); }
.btn-col { display:flex; flex-direction:column; gap:4px; }
button { padding:8px 16px; border:none; border-radius:var(--radius); cursor:pointer; font-size:13px; font-weight:600; white-space:nowrap; }
.btn-primary { background:var(--accent); color:#000; }
.btn-primary:hover { background:#79c0ff; }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }
.btn-danger { background:var(--red); color:#fff; }
.btn-secondary { background:var(--bg3); color:var(--fg); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--border); }
.hidden { display:none !important; }
.input-footer { display:flex; justify-content:space-between; margin-top:6px; font-size:12px; color:var(--fg2); }
.streaming-dot::after { content:'вЧП'; animation:blink 1s infinite; color:var(--accent); margin-left:4px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Loading indicator */
.loading-indicator { display:flex; align-items:center; gap:8px; padding:12px 16px; color:var(--fg2); font-size:13px; }
.loading-dots { display:inline-flex; gap:4px; }
.loading-dots span { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:loadBounce .6s infinite alternate; }
.loading-dots span:nth-child(2) { animation-delay:.2s; }
.loading-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes loadBounce { 0%{opacity:.3;transform:translateY(0)} 100%{opacity:1;transform:translateY(-4px)} }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* Settings */
.settings-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; display:flex; align-items:center; justify-content:center; }
.settings-overlay.hidden { display:none; }
.settings-panel { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:24px; width:520px; max-width:90vw; }
.settings-panel h2 { font-size:18px; margin-bottom:16px; color:var(--accent); }
.sg { margin-bottom:14px; }
.sg label { display:block; font-size:13px; font-weight:600; color:var(--fg2); margin-bottom:6px; }
.sg .hint { font-size:11px; color:var(--fg2); margin-top:4px; }
.sg input,.sg select { width:100%; background:var(--bg3); color:var(--fg); border:1px solid var(--border); border-radius:var(--radius); padding:8px 12px; font-size:14px; outline:none; }
.sg input:focus,.sg select:focus { border-color:var(--accent); }
.settings-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
.btn-settings { background:var(--bg3); color:var(--fg); border:1px solid var(--border); border-radius:var(--radius); padding:6px 12px; cursor:pointer; font-size:13px; }
.settings-saved { color:var(--green); font-size:13px; margin-right:auto; align-self:center; opacity:0; transition:opacity .3s; }
.settings-saved.show { opacity:1; }

/* Sidebar */
#sidebar { width:250px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; transition:width .25s ease; flex-shrink:0; }
#sidebar.collapsed { width:0; border-right:none; }
.sidebar-header { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-bottom:1px solid var(--border); }
.sidebar-header span { font-size:14px; font-weight:600; }
.sidebar-body { flex:1; overflow-y:auto; padding:4px 0; }
.project-group { margin-bottom:4px; }
.project-name { font-size:11px; font-weight:700; color:var(--fg2); padding:8px 12px 4px; letter-spacing:.3px; }
.session-item { display:flex; flex-direction:column; padding:8px 12px; cursor:pointer; border-left:3px solid transparent; transition:background .15s; }
.session-item:hover { background:var(--bg3); }
.session-item.active { background:#1c2d4a; border-left-color:var(--accent); }
.session-summary { font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.session-meta { font-size:11px; color:var(--fg2); margin-top:2px; }
.btn-icon { background:none; border:none; color:var(--fg2); cursor:pointer; font-size:16px; padding:4px 6px; border-radius:4px; }
.btn-icon:hover { background:var(--bg3); color:var(--fg); }

/* File Panel */
#filePanel { width:280px; background:var(--bg2); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; transition:width .25s ease; flex-shrink:0; }
#filePanel.collapsed { width:0; border-left:none; }
.filepanel-header { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-bottom:1px solid var(--border); }
.filepanel-header span { font-size:14px; font-weight:600; }
.filepanel-body { flex:1; overflow-y:auto; padding:4px 0; }
.tree-item { display:flex; align-items:center; gap:4px; padding:3px 8px; cursor:pointer; font-size:13px; white-space:nowrap; }
.tree-item:hover { background:var(--bg3); }
.tree-icon { font-size:12px; width:16px; text-align:center; flex-shrink:0; }
.tree-name { overflow:hidden; text-overflow:ellipsis; }
.tree-children { display:none; }
.tree-children.open { display:block; }
.tree-size { font-size:11px; color:var(--fg2); margin-left:auto; }

/* File Viewer Modal */
.file-viewer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; display:flex; align-items:center; justify-content:center; }
.file-viewer-overlay.hidden { display:none; }
.file-viewer-panel { background:var(--bg2); border:1px solid var(--border); border-radius:12px; width:70vw; max-width:900px; max-height:80vh; display:flex; flex-direction:column; }
.file-viewer-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); }
.file-viewer-header .fv-path { font-size:13px; color:var(--accent); font-family:monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-viewer-content { flex:1; overflow:auto; padding:16px; }
.file-viewer-content pre { margin:0; white-space:pre-wrap; font-size:13px; font-family:'Cascadia Code','Fira Code',monospace; line-height:1.5; }

/* Folder Browser Modal */
.folder-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:150; display:flex; align-items:center; justify-content:center; }
.folder-overlay.hidden { display:none; }
.folder-panel { background:var(--bg2); border:1px solid var(--border); border-radius:12px; width:500px; max-width:90vw; max-height:70vh; display:flex; flex-direction:column; }
.folder-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); }
.folder-header .folder-path { font-size:13px; color:var(--accent); font-family:monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.folder-body { flex:1; overflow-y:auto; padding:4px 0; min-height:200px; }
.folder-item { display:flex; align-items:center; gap:8px; padding:8px 16px; cursor:pointer; font-size:13px; }
.folder-item:hover { background:var(--bg3); }
.folder-item .fi-icon { font-size:14px; flex-shrink:0; }
.folder-footer { display:flex; justify-content:flex-end; gap:8px; padding:12px 16px; border-top:1px solid var(--border); }
.btn-browse { background:var(--bg3); color:var(--fg); border:1px solid var(--border); border-radius:var(--radius); padding:4px 10px; cursor:pointer; font-size:13px; white-space:nowrap; }
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <span>дЉЪиѓЭеИЧи°®</span>
      <div style="display:flex;gap:4px;">
        <button id="locateSessionBtn" class="btn-icon" title="еЃЪдљНељУеЙНдЉЪиѓЭ">рЯУН</button>
        <button id="newSessionSideBtn" class="btn-icon" title="жЦ∞еїЇдЉЪиѓЭ">пЉЛ</button>
        <button id="sidebarCloseBtn" class="btn-icon" title="жФґиµЈдЊІж†П">вЧА</button>
      </div>
    </div>
    <div style="padding:6px 8px;border-bottom:1px solid var(--border)">
      <input id="sidebarSearch" type="text" placeholder="жРЬзіҐзЫЃељХ..." style="width:100%;background:var(--bg3);color:var(--fg);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:12px;outline:none;" />
    </div>
    <div class="sidebar-body" id="sidebarBody"></div>
  </aside>

function showHelp() {
  const helpText = SLASH_COMMANDS.map(c => `${c.cmd} - ${c.desc}`).join('\n');
  appendSystemMsg('еПѓзФ®еСљдї§:\n' + helpText);
}

function showModelInfo() {
  if (!selectedModel) {
    appendSystemMsg('жЬ™йАЙжЛ©ж®°еЮЛ');
    return;
  }
  const info = `${selectedModel.label}${selectedModel.provider ? ' (' + selectedModel.provider + ')' : ''}`;
  appendSystemMsg('ељУеЙНж®°еЮЛ: ' + info);
}

function rewindLastMessage() {
  // Get all message elements (including tool cards, ask panels, etc.)
  const allElements = messagesEl.children;
  if (allElements.length === 0) {
    appendSystemMsg('ж≤°жЬЙжґИжБѓеПѓдї•жТ§йФА', 'error');
    return;
  }

  // Find last user message
  let lastUserIndex = -1;
  for (let i = allElements.length - 1; i >= 0; i--) {
    const el = allElements[i];
    if (el.classList.contains('msg') && el.classList.contains('user')) {
      lastUserIndex = i;
      break;
    }
  }

  if (lastUserIndex === -1) {
    appendSystemMsg('ж≤°жЬЙзФ®жИЈжґИжБѓеПѓдї•жТ§йФА', 'error');
    return;
  }

  // Get user message content
  const userMsg = allElements[lastUserIndex];
  const content = userMsg.querySelector('.content')?.textContent || '';

  // Remove all elements from last user message onwards (including tool cards, ask panels, loading indicators, etc.)
  const elementsToRemove = [];
  for (let i = lastUserIndex; i < allElements.length; i++) {
    elementsToRemove.push(allElements[i]);
  }
  elementsToRemove.forEach(el => el.remove());

  // Restore content to input
  promptInput.value = content;
  promptInput.focus();
  appendSystemMsg('еЈ≤еЫЮйААеИ∞дЄКжђ°иЊУеЕ•');
}

function showDropdown(items) {
  dropdownItems = items;
  dropdownIndex = items.length > 0 ? 0 : -1;
  cmdDropdown.innerHTML = '';
  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'cmd-dropdown-item' + (i === 0 ? ' active' : '');
    el.innerHTML = `<span class="cmd-icon">${item.icon || '¬Ј'}</span><span class="cmd-label">${escHtml(item.label)}</span><span class="cmd-desc">${escHtml(item.desc || '')}</span>`;
    el.addEventListener('click', () => selectDropdownItem(i));
    cmdDropdown.appendChild(el);
  });
  cmdDropdown.classList.add('visible');
}

function hideDropdown() {
  cmdDropdown.classList.remove('visible');
  cmdDropdown.innerHTML = '';
  dropdownItems = [];
  dropdownIndex = -1;
}

function setDropdownIndex(i) {
  if (i < 0 || i >= dropdownItems.length) return;
  dropdownIndex = i;
  const items = cmdDropdown.querySelectorAll('.cmd-dropdown-item');
  items.forEach((el, idx) => el.classList.toggle('active', idx === i));
  items[i]?.scrollIntoView({ block: 'nearest' });
}

function selectDropdownItem(i) {
  if (i < 0 || i >= dropdownItems.length) return;
  const item = dropdownItems[i];
  if (item.onSelect) item.onSelect();
  hideDropdown();
}

function checkSlashCommand() {
  const val = promptInput.value;
  if (!val.startsWith('/')) { hideDropdown(); return; }
  const query = val.slice(1).toLowerCase();
  const matches = SLASH_COMMANDS.filter(c => c.cmd.slice(1).startsWith(query));
  if (matches.length) {
    showDropdown(matches.map(c => ({
      label: c.label,
      desc: c.desc,
      icon: c.icon,
      onSelect: () => { promptInput.value = ''; c.handler(); }
    })));
  } else {
    hideDropdown();
  }
}

async function loadFileListFlat() {
  const cwd = cwdInput.value || '';
  if (!cwd) return [];
  if (fileListCache && fileListCwd === cwd) return fileListCache;
  try {
    const res = await fetch('/api/files-flat?cwd=' + encodeURIComponent(cwd));
    const data = await res.json();
    fileListCache = data;
    fileListCwd = cwd;
    return data;
  } catch (e) {
    console.error('[loadFileListFlat]', e);
    return [];
  }
}

function getMentionContext() {
  const val = promptInput.value;
  const pos = promptInput.selectionStart;
  const before = val.slice(0, pos);
  const atIdx = before.lastIndexOf('@');
  if (atIdx === -1) return null;
  const afterAt = before.slice(atIdx + 1);
  if (/\s/.test(afterAt)) return null; // space closes mention
  return { start: atIdx, query: afterAt };
}

async function checkFileMention() {
  const ctx = getMentionContext();
  if (!ctx) { hideDropdown(); return; }
  const files = await loadFileListFlat();
  const query = ctx.query.toLowerCase();
  const matches = files.filter(f => f.path.toLowerCase().includes(query)).slice(0, 20);
  if (matches.length) {
    showDropdown(matches.map(f => ({
      label: f.path,
      desc: f.type === 'dir' ? 'зЫЃељХ' : 'жЦЗдїґ',
      icon: f.type === 'dir' ? 'рЯУБ' : 'рЯУД',
      onSelect: () => {
        const val = promptInput.value;
        const pos = promptInput.selectionStart;
        const newVal = val.slice(0, ctx.start) + '@' + f.path + ' ' + val.slice(pos);
        promptInput.value = newVal;
        promptInput.selectionStart = promptInput.selectionEnd = ctx.start + f.path.length + 2;
        promptInput.focus();
      }
    })));
  } else {
    hideDropdown();
  }
}

function isDropdownVisible() {

}

// --- Tool category map ---
const TOOL_CAT = {

// --- WebSocket ---
function connectWS() {
  const proto = location.protocol==='https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => { connStatus.className='status-dot online'; connStatus.title='еЈ≤ињЮжО•'; };
  ws.onclose = () => { connStatus.className='status-dot offline'; connStatus.title='жЬ™ињЮжО•'; setTimeout(connectWS,3000); };
  ws.onerror = () => {};
  ws.onmessage = e => { try { handleMsg(JSON.parse(e.data)); } catch(err) { console.error('[ws parse]', err); } };
}
function wsSend(d) { if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(d)); }

// --- Message dispatch ---
function handleMsg(msg) {
  switch(msg.type) {
    case 'session-created': sessionId=msg.sessionId; sessionInfo.textContent='дЉЪиѓЭ: '+sessionId.slice(0,8)+'...'; break;
    case 'claude-response': handleClaudeResponse(msg.data); break;
    case 'claude-complete': finishStreaming(); setStreaming(false); break;
    case 'claude-error': finishStreaming(); setStreaming(false); appendSystemMsg('йФЩиѓѓ: '+msg.error,'error'); break;
    case 'session-aborted': finishStreaming(); setStreaming(false); appendSystemMsg('дЉЪиѓЭеЈ≤еБЬж≠Ґ'); break;
    case 'permission-request': showPermission(msg); break;
    case 'permission-cancelled': permBanner.classList.add('hidden'); break;
  }
}

// --- Claude response processing ---
function handleClaudeResponse(raw) {
  if(!raw) return;
  const data = raw.message || raw;
  console.log('[msg]', data.type, data.subtype||'', data.role||'');

  if(data.type==='system' && data.subtype==='init') return;

  // Streaming text
  if(data.type==='content_block_delta') {
    const t = data.delta?.text ?? data.delta?.text_delta ?? '';
    if(t) { feedStream(t); }
    return;
  }
  if(data.type==='content_block_stop') { finishStreaming(); return; }

  // Structured content array
  if(Array.isArray(data.content)) {
    if(data.role==='user') {
      for(const p of data.content) {
        if(p.type==='tool_result') {
          const txt = typeof p.content==='string' ? p.content
            : Array.isArray(p.content) ? p.content.map(c=>c.text||'').join('') : JSON.stringify(p.content);
          appendToolResult({ tool_use_id:p.tool_use_id, content:txt, is_error:p.is_error });
        }
      }
      return;
    }
    for(const p of data.content) {
      if(p.type==='text' && p.text?.trim()) { feedStream(p.text); }
      if(p.type==='tool_use') { finishStreaming(); handleToolUse(p); }
    }
    return;
  }

  // Plain string
  if(typeof data.content==='string' && data.content.trim()) {
    feedStream(data.content); return;
  }

  // Result
  if(data.type==='result') {
    finishStreaming();
    if(data.subtype==='error_max_turns') appendSystemMsg('еЈ≤иЊЊеИ∞жЬАе§ІиљЃжђ°');
  }
}

// ========== AskUserQuestion ==========
function renderAskUserQuestion(part) {
  const input = part.input || {};
  const questions = input.questions || [];
  const panel = document.createElement('div');
  panel.className = 'ask-panel';
  panel.dataset.toolId = part.id || '';
  panel.dataset.toolName = 'AskUserQuestion';

  // State for multi-step
  let step = 0;
  const answers = {};

  function renderStep() {
    const q = questions[step];
    if(!q) return;
    const multi = q.multiSelect || false;
    const selected = new Set();
    let otherText = '';

    panel.innerHTML = '';
    if(q.header) { const h = document.createElement('div'); h.className='ask-header'; h.textContent=q.header; panel.appendChild(h); }
    const qEl = document.createElement('div'); qEl.className='ask-q';
    qEl.textContent = `${questions.length>1 ? `(${step+1}/${questions.length}) ` : ''}${q.question}`;
    panel.appendChild(qEl);

    const optsEl = document.createElement('div'); optsEl.className='ask-opts';
    (q.options||[]).forEach((opt, i) => {
      const el = document.createElement('div');
      el.className = 'ask-opt' + (multi ? ' multi' : '');
      el.innerHTML = `<div class="opt-radio"></div><div><div class="opt-label">${escHtml(opt.label)}</div>${opt.description ? `<div class="opt-desc">${escHtml(opt.description)}</div>` : ''}</div>`;
      el.addEventListener('click', () => {
        if(multi) { selected.has(i) ? selected.delete(i) : selected.add(i); }
        else { selected.clear(); selected.add(i); }
        optsEl.querySelectorAll('.ask-opt').forEach((o,j) => o.classList.toggle('selected', selected.has(j)));
      });
      optsEl.appendChild(el);
    });
    panel.appendChild(optsEl);

    // "Other" free text
    const otherDiv = document.createElement('div'); otherDiv.className='ask-other';
    otherDiv.innerHTML = `<input type="text" placeholder="еЕґдїЦ (иЗ™еЃЪдєЙеЫЮе§Н)..." />`;
    otherDiv.querySelector('input').addEventListener('input', e => { otherText = e.target.value; });
    panel.appendChild(otherDiv);

    // Buttons
    const btns = document.createElement('div'); btns.className='ask-btns';
    if(step > 0) {
      const backBtn = document.createElement('button'); backBtn.className='btn-secondary'; backBtn.textContent='дЄКдЄАж≠•';
      backBtn.addEventListener('click', () => { step--; renderStep(); });
      btns.appendChild(backBtn);
    }
    const nextLabel = step < questions.length-1 ? 'дЄЛдЄАж≠•' : 'жПРдЇ§';
    const nextBtn = document.createElement('button'); nextBtn.className='btn-primary'; nextBtn.textContent=nextLabel;
    nextBtn.addEventListener('click', () => {
      // Collect answer
      const opts = q.options||[];
      const vals = [...selected].map(i => opts[i].label);
      if(otherText.trim()) vals.push(otherText.trim());
      answers[q.question] = vals.join(', ');
      if(step < questions.length-1) { step++; renderStep(); }
      else { submitAsk(); }
    });
    btns.appendChild(nextBtn);
    const skipBtn = document.createElement('button'); skipBtn.className='btn-secondary'; skipBtn.textContent='иЈ≥ињЗ';
    skipBtn.addEventListener('click', () => { submitAsk(true); });
    btns.appendChild(skipBtn);
    panel.appendChild(btns);
  }

  function submitAsk(skip) {
    const decision = { allow:true, updatedInput: { ...input, answers: skip ? {} : answers } };
    wsSend({ type:'permission-response', requestId: panel._requestId, ...decision });
    // Replace with answered display
    panel.innerHTML = '';
    panel.className = 'ask-answered';
    if(skip) { panel.innerHTML = '<div class="ans-q" style="color:var(--fg2)">еЈ≤иЈ≥ињЗ</div>'; }
    else {
      for(const [q, a] of Object.entries(answers)) {
        const row = document.createElement('div');
        row.innerHTML = `<div class="ans-q">${escHtml(q)}</div><div class="ans-v">${escHtml(a)}</div>`;
        panel.appendChild(row);
      }
    }
    scrollBottom();
  }

  renderStep();
  messagesEl.appendChild(panel);
  scrollBottom();
}

      row.innerHTML = `<span class="todo-icon ${iconCls}">${icon}</span><span class="todo-text">${escHtml(t.subject||t.content||'')}</span>`;

function parseTodoItems(input) {
  if(!input) return [];
  // TodoWrite: input.todos array
  if(Array.isArray(input.todos)) return input.todos;
  if(Array.isArray(input.items)) return input.items;
  // TodoRead result: try JSON parse
  if(typeof input === 'string') { try { const d=JSON.parse(input); if(Array.isArray(d)) return d; } catch{} }
  return [];
}

function renderTaskResult(card, content) {
  const body = card.querySelector('.tool-body') || card;
  const items = parseTaskItems(content);
  if(!items.length) return;
  const wrap = document.createElement('div'); wrap.className='task-list';
  const done = items.filter(t=>t.status==='completed').length;
  wrap.innerHTML = `<div class="task-progress"><div class="task-progress-bar" style="width:${items.length?Math.round(done/items.length*100):0}%"></div></div>`;
  items.forEach(t => {
    const row = document.createElement('div'); row.className='task-item';
    const icon = t.status==='completed' ? 'вЬЕ' : t.status==='in_progress' ? 'рЯФД' : 'в≠Х';
    row.innerHTML = `<span>${icon}</span><span style="flex:1">${escHtml(t.subject||t.text||'')}</span><span class="task-status ${t.status||'pending'}">${t.status||'pending'}</span>`;
    wrap.appendChild(row);
  });
  body.innerHTML = '';
  body.appendChild(wrap);
}

function parseTaskItems(content) {
  if(!content) return [];
  // Try JSON
  try { const d=JSON.parse(content); if(Array.isArray(d)) return d; if(d.tasks) return d.tasks; } catch{}
  // Try regex: #1. [completed] subject
  const items = [];
  const re = /#(\d+)\.?\s*(?:\[(\w+)\]\s*)?(.+)/g;
  let m;
  while((m=re.exec(content))) items.push({ id:m[1], status:m[2]||'pending', subject:m[3].trim() });
  if(items.length) return items;
  // Fallback: line-based
  content.split('\n').filter(l=>l.trim()).forEach(l => items.push({ subject:l.trim(), status:'pending' }));
  return items;
}

function createToolCard(part) {
  const name = part.name || 'Tool';

function getToolSummary(name, input) {
  if(!input) return '';
  if(name==='Bash') return input.command ? input.command.slice(0,60) : '';
  if(name==='Read') return input.file_path ? input.file_path.split(/[/\\]/).pop() : '';
  if(name==='Edit'||name==='Write') return input.file_path ? input.file_path.split(/[/\\]/).pop() : '';
  if(name==='Grep') return input.pattern || '';
  if(name==='Glob') return input.pattern || '';
  if(name==='TaskCreate') return input.subject || '';
  if(name==='TaskUpdate') return `#${input.taskId||'?'} вЖТ ${input.status||''}`;
  if(name==='TaskList') return 'еИЧеЗЇдїїеК°';
  if(name==='TaskGet') return `#${input.taskId||'?'}`;
  return '';
}

function formatToolInput(name, input) {
  if(!input) return '';
  if(typeof input==='string') return input;
  if(name==='Bash') return input.command || JSON.stringify(input,null,2);
  if(name==='Edit') return '__DIFF_VIEW__';
  if(name==='Write') return `жЦЗдїґ: ${input.file_path||''}\n${input.content||''}`;
  return JSON.stringify(input, null, 2);
}

function renderDiffView(input) {
  if (!input || !input.old_string || !input.new_string) {
    return `<pre>${escHtml(JSON.stringify(input, null, 2))}</pre>`;
  }

  const filePath = input.file_path || '(unknown file)';
  const oldLines = input.old_string.split('\\n');
  const newLines = input.new_string.split('\\n');

  let html = `<div class="diff-view"><div class="diff-file">жЦЗдїґ: ${escHtml(filePath)}</div>`;

  // Simple line-by-line diff
  const maxLen = Math.max(oldLines.length, newLines.length);
  for (let i = 0; i < maxLen; i++) {
    const oldLine = oldLines[i];
    const newLine = newLines[i];

    if (oldLine !== undefined && (newLine === undefined || oldLine !== newLine)) {
      html += `<div class="diff-line removed">${escHtml(oldLine)}</div>`;
    }
    if (newLine !== undefined && (oldLine === undefined || oldLine !== newLine)) {
      html += `<div class="diff-line added">${escHtml(newLine)}</div>`;
    }
    if (oldLine === newLine && oldLine !== undefined) {
      html += `<div class="diff-line context">${escHtml(oldLine)}</div>`;
    }
  }

  html += '</div>';
  return html;
}

function appendToolResult(block) {
  const cards = messagesEl.querySelectorAll('.tool-card, .ask-panel');
  let target = null;
  if(block.tool_use_id) {
    for(const c of cards) { if(c.dataset.toolId===block.tool_use_id) { target=c; break; } }
  }
  if(!target && cards.length) target = cards[cards.length-1];

  const text = typeof block.content==='string' ? block.content : JSON.stringify(block.content);

  // Special rendering for task tools
  if(target && (target.dataset.toolName==='TaskList' || target.dataset.toolName==='TaskGet')) {
    renderTaskResult(target, text);
    target.classList.add('open');
    scrollBottom();
    if(isStreaming && !streamingEl) showLoading();
    return;
  }
  // Special rendering for TodoRead result
  if(target && target.dataset.toolName==='TodoRead') {
    const items = parseTodoItems(text);
    if(items.length) {
      const body = target.querySelector('.tool-body');
      body.innerHTML = '';
      const list = document.createElement('div'); list.className='todo-list';
      items.forEach(t => {
        const row = document.createElement('div'); row.className='todo-item';
        const icon = t.status==='completed'?'вЬЕ':t.status==='in_progress'?'рЯФД':'в≠Х';
        const cls = t.status==='completed'?'done':t.status==='in_progress'?'progress':'pending';
        row.innerHTML = `<span class="todo-icon ${cls}">${icon}</span><span class="todo-text">${escHtml(t.subject||t.content||'')}</span>`;

      });
      body.appendChild(list);
      target.classList.add('open');
      scrollBottom();
      if(isStreaming && !streamingEl) showLoading();
      return;
    }
  }

  const truncated = text.length>3000 ? text.slice(0,3000)+'\n... (truncated)' : text;
  if(target) {
    const res = document.createElement('div');
    res.className = 'tool-result' + (block.is_error ? ' error' : '');
    res.innerHTML = `<pre>${escHtml(truncated)}</pre>`;
    target.appendChild(res);
  }
  scrollBottom();

  // Show loading indicator after tool result, waiting for next response
  if(isStreaming && !streamingEl) {
    showLoading();
  }
}

// ========== Streaming helpers ==========
let typeQueue = []; // queue of text chunks to simulate typing
let typeTimer = null;
const TYPE_CHUNK = 12; // characters per tick
const TYPE_INTERVAL = 20; // ms between ticks

function feedStream(text) {
  // If it's a small delta (real streaming), render immediately
  if(text.length <= TYPE_CHUNK * 2) {
    streamBuf += text;
    ensureAssistantEl();
    scheduleFlush();
    return;
  }
  // Large block: queue it for simulated streaming
  typeQueue.push(text);
  if(!typeTimer) drainTypeQueue();
}

function drainTypeQueue() {
  if(!typeQueue.length) { typeTimer = null; return; }
  const chunk = typeQueue[0];
  const pos = typeQueue._pos || 0;
  const end = Math.min(pos + TYPE_CHUNK, chunk.length);
  streamBuf += chunk.slice(pos, end);
  ensureAssistantEl();
  flushBuf();
  if(end >= chunk.length) {
    typeQueue.shift();
    typeQueue._pos = 0;
  } else {
    typeQueue._pos = end;
  }
  typeTimer = setTimeout(drainTypeQueue, TYPE_INTERVAL);
}

function flushTypeQueue() {
  // Immediately dump all remaining queued text
  if(typeTimer) { clearTimeout(typeTimer); typeTimer = null; }
  for(const chunk of typeQueue) {
    const pos = typeQueue._pos || 0;
    streamBuf += chunk.slice(pos);
  }
  typeQueue = [];
  typeQueue._pos = 0;
}

function scheduleFlush() { if(flushTimer) return; flushTimer=setTimeout(()=>{ flushTimer=null; flushBuf(); },30); }
function ensureAssistantEl() {
  if(!streamingEl) {
    hideLoading();
    streamingEl=createMsgEl('assistant');
    messagesEl.appendChild(streamingEl);
  }
}
function flushBuf() {
  if(!streamBuf) return;
  ensureAssistantEl();
  const c = streamingEl.querySelector('.content');
  c.innerHTML = marked.parse(streamBuf);
  c.querySelectorAll('pre code').forEach(el => { try { hljs.highlightElement(el); } catch(e) {} });
  scrollBottom();
}
function finishStreaming() {
  flushTypeQueue();
  if(flushTimer) { clearTimeout(flushTimer); flushTimer=null; }
  if(streamBuf) flushBuf();
  if(streamingEl) { streamingEl.querySelector('.role')?.classList.remove('streaming-dot'); streamingEl=null; }
  streamBuf='';
}

let projectsData = [];

async function loadProjects() {
  try {

  } catch(e) { console.error('[loadProjects]', e); }

sidebarSearch.addEventListener('input', () => renderSidebar());

function renderSidebar() {
  sidebarBody.innerHTML = '';
  const query = (sidebarSearch.value || '').trim().toLowerCase();
  const filtered = query
    ? projectsData.filter(p => decodeProjectName(p.name).toLowerCase().includes(query))
    : projectsData;
  if(!filtered.length) {
    sidebarBody.innerHTML = `<div style="padding:16px;color:var(--fg2);font-size:13px;text-align:center">${query ? 'жЧ†еМєйЕНзїУжЮЬ' : 'жЪВжЧ†дЉЪиѓЭиЃ∞ељХ'}</div>`;
    return;
  }
  for(const proj of filtered) {
    const group = document.createElement('div');
    group.className = 'project-group';
    const displayName = decodeProjectName(proj.name);
    // Auto-expand when searching
    const isExpanded = query ? true : expandedProjects.has(proj.name);
    const arrow = isExpanded ? 'вЦЉ' : 'вЦґ';
    const nameEl = document.createElement('div');
    nameEl.className = 'project-name';
    nameEl.title = displayName;
    nameEl.style.cursor = 'pointer';
    nameEl.style.userSelect = 'none';
    nameEl.innerHTML = `<span style="font-size:10px;margin-right:4px">${arrow}</span>${escHtml(displayName)} <span style="font-weight:400;opacity:.6">(${proj.sessions.length})</span>`;
    group.appendChild(nameEl);
    const sessionsWrap = document.createElement('div');
    sessionsWrap.style.display = isExpanded ? 'block' : 'none';
    for(const s of proj.sessions) {
      const item = document.createElement('div');
      item.className = 'session-item' + (s.id === sessionId ? ' active' : '');
      item.innerHTML = `<div class="session-summary">${escHtml(s.summary || s.id.slice(0,12))}</div><div class="session-meta">${s.msgCount}жЭ°жґИжБѓ ¬Ј ${timeAgo(s.mtime)}</div>`;
      item.addEventListener('click', () => switchSession(proj.name, s.id));
      sessionsWrap.appendChild(item);
    }
    group.appendChild(sessionsWrap);
    nameEl.addEventListener('click', () => {
      if(expandedProjects.has(proj.name)) { expandedProjects.delete(proj.name); } else { expandedProjects.add(proj.name); }
      renderSidebar();
    });
    sidebarBody.appendChild(group);
  }
}

function decodeProjectName(name) {
  // ~/.claude/projects/ uses path encoding: E--code-github becomes E:\code\github
  // Pattern: drive letter + -- + path with - as separator
  const match = name.match(/^([A-Z])--(.+)$/);
  if (match) {
    const drive = match[1];
    const pathPart = match[2].replace(/-/g, '\\');
    return `${drive}:\\${pathPart}`;
  }
  return name.replace(/-/g, '\\');
}

function locateCurrentSession() {
  const cwd = cwdInput.value.trim();
  if (!cwd) {
    appendSystemMsg('иѓЈеЕИиЃЊзљЃеЈ•дљЬзЫЃељХ', 'error');
    return;
  }

  // Encode cwd to project name format (e.g., E:\code\github -> E--code-github)
  const encodedCwd = encodeProjectName(cwd);

  // Find the project matching current cwd
  let targetProject = null;
  for (const proj of projectsData) {
    if (proj.name === encodedCwd) {
      targetProject = proj;
      break;
    }
  }

  if (!targetProject) {
    appendSystemMsg('ељУеЙНеЈ•дљЬзЫЃељХж≤°жЬЙеѓєеЇФзЪДдЉЪиѓЭиЃ∞ељХ', 'error');
    return;
  }

  if (targetProject.sessions.length === 0) {
    appendSystemMsg('ељУеЙНй°єзЫЃж≤°жЬЙдЉЪиѓЭиЃ∞ељХ', 'error');
    return;
  }

  // Expand the project
  expandedProjects.add(targetProject.name);

  // Re-render sidebar
  renderSidebar();

  // Expand sidebar if collapsed
  sidebar.classList.remove('collapsed');

  // Scroll to the first (latest) session
  setTimeout(() => {
    const projectGroups = sidebarBody.querySelectorAll('.project-group');
    for (const group of projectGroups) {
      const nameEl = group.querySelector('.project-name');
      if (nameEl && nameEl.textContent.includes(decodeProjectName(targetProject.name))) {
        const firstSession = group.querySelector('.session-item');
        if (firstSession) {
          firstSession.scrollIntoView({ behavior: 'smooth', block: 'center' });
          // Highlight briefly
          firstSession.style.background = 'var(--accent)';
          firstSession.style.transition = 'background 0.5s';
          setTimeout(() => {
            firstSession.style.background = '';
          }, 1000);
        }
        break;
      }
    }
  }, 100);
}

function encodeProjectName(cwdPath) {
  // Convert path like E:\code\github to E--code-github
  const normalized = cwdPath.replace(/\//g, '\\');
  const match = normalized.match(/^([A-Z]):\\(.+)$/);
  if (match) {
    const drive = match[1];
    const pathPart = match[2].replace(/\\/g, '-');
    return `${drive}--${pathPart}`;
  }
  return normalized.replace(/\\/g, '-');
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if(mins < 1) return 'еИЪеИЪ';
  if(mins < 60) return mins + 'еИЖйТЯеЙН';
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + 'е∞ПжЧґеЙН';
  const days = Math.floor(hrs / 24);
  if(days < 30) return days + 'е§©еЙН';
  return Math.floor(days / 30) + 'дЄ™жЬИеЙН';
}

async function switchSession(projectName, sid) {
  try {
    const msgs = await (await fetch(`/api/projects/${encodeURIComponent(projectName)}/sessions/${encodeURIComponent(sid)}/messages`)).json();
    // Clear and replay
    messagesEl.innerHTML = '';
    finishStreaming();
    setStreaming(false);
    sessionId = sid;
    sessionInfo.textContent = 'дЉЪиѓЭ: ' + sid.slice(0,8) + '...';
    // Auto-expand the project in sidebar (Fix 6)
    for (const proj of projectsData) {
      if (proj.sessions.some(s => s.id === sid)) { expandedProjects.add(proj.name); break; }
    }
    for(const m of msgs) {
      if(m.role === 'user') { appendUserMsg(m.content); continue; }
      // Assistant message: render parts if available
      if(m.parts && m.parts.length) {
        for(const part of m.parts) {
          if(part.type === 'text') {
            const el = createMsgEl('assistant');
            el.querySelector('.content').innerHTML = marked.parse(part.text);
            el.querySelector('.content').querySelectorAll('pre code').forEach(c => { try { hljs.highlightElement(c); } catch(e) {} });
            el.querySelector('.role').classList.remove('streaming-dot');
            messagesEl.appendChild(el);
          } else if(part.type === 'tool_use') {
            const card = createToolCard(part);
            messagesEl.appendChild(card);
          } else if(part.type === 'tool_result') {
            appendToolResult(part);
          }
        }
      } else if(m.content) {
        const el = createMsgEl('assistant');
        el.querySelector('.content').innerHTML = marked.parse(m.content);
        el.querySelector('.content').querySelectorAll('pre code').forEach(c => { try { hljs.highlightElement(c); } catch(e) {} });
        el.querySelector('.role').classList.remove('streaming-dot');
        messagesEl.appendChild(el);
      }
    }
    scrollBottom();
    renderSidebar();
  } catch(e) { console.error('[switchSession]', e); appendSystemMsg('еК†иљљдЉЪиѓЭе§±иі•: ' + e.message, 'error'); }
}

async function loadFileTree() {
  const cwd = cwdInput.value || '';
  if(!cwd) { fileTreeBody.innerHTML = '<div style="padding:16px;color:var(--fg2);font-size:13px;text-align:center">иѓЈеЕИиЃЊзљЃеЈ•дљЬзЫЃељХ</div>'; return; }
  try {
    const items = await (await fetch('/api/files?cwd=' + encodeURIComponent(cwd))).json();
    fileTreeBody.innerHTML = '';
    renderFileTree(items, fileTreeBody, 0);
  } catch(e) { fileTreeBody.innerHTML = `<div style="padding:16px;color:var(--red);font-size:13px">${escHtml(e.message)}</div>`; }
}

function renderFileTree(items, container, depth) {
  for(const item of items) {
    const row = document.createElement('div');
    row.className = 'tree-item';
    row.style.paddingLeft = (8 + depth * 16) + 'px';
    if(item.type === 'dir') {
      row.innerHTML = `<span class="tree-icon">вЦґ</span><span class="tree-name">рЯУБ ${escHtml(item.name)}</span>`;
      container.appendChild(row);
      const childContainer = document.createElement('div');
      childContainer.className = 'tree-children';
      container.appendChild(childContainer);
      if(item.children?.length) renderFileTree(item.children, childContainer, depth + 1);
      row.addEventListener('click', () => {
        childContainer.classList.toggle('open');
        row.querySelector('.tree-icon').textContent = childContainer.classList.contains('open') ? 'вЦЉ' : 'вЦґ';
      });
    } else {
      const sizeStr = item.size > 1024 ? (item.size / 1024).toFixed(1) + 'K' : item.size + 'B';
      row.innerHTML = `<span class="tree-icon">¬Ј</span><span class="tree-name">${escHtml(item.name)}</span><span class="tree-size">${sizeStr}</span>`;
      row.addEventListener('click', () => viewFile(item.path));
      container.appendChild(row);
    }
  }
}

async function viewFile(filePath) {
  try {
    const data = await (await fetch('/api/file?path=' + encodeURIComponent(filePath))).json();
    if(data.error) { appendSystemMsg(data.error, 'error'); return; }
    fvPath.textContent = filePath;
    fvContent.textContent = data.content;
    // Try syntax highlight
    const ext = filePath.split('.').pop();
    try { if(ext && typeof hljs !== 'undefined' && hljs.getLanguage(ext)) {
      fvContent.innerHTML = hljs.highlight(data.content, { language: ext }).value;
    } } catch(e) {}
    fileViewer.classList.remove('hidden');
  } catch(e) { appendSystemMsg('иѓїеПЦжЦЗдїґе§±иі•: ' + e.message, 'error'); }
}

async function browseTo(targetPath) {
  try {
    const res = await (await fetch('/api/browse?path=' + encodeURIComponent(targetPath || ''))).json();
    if(res.error) { fbBody.innerHTML = `<div style="padding:16px;color:var(--red)">${escHtml(res.error)}</div>`; return; }
    fbCurrentPath = res.path || '';
    fbPath.textContent = fbCurrentPath || 'жИСзЪДзФµиДС';
    fbBody.innerHTML = '';
    // Parent directory
    if(res.parent) {
      const item = document.createElement('div'); item.className = 'folder-item';
      item.innerHTML = '<span class="fi-icon">вђЖ</span><span>.. ињФеЫЮдЄКзЇІ</span>';
      item.addEventListener('click', () => browseTo(res.parent));
      fbBody.appendChild(item);
    }
    // Subdirectories
    for(const dir of res.dirs) {
      const item = document.createElement('div'); item.className = 'folder-item';
      item.innerHTML = `<span class="fi-icon">рЯУБ</span><span>${escHtml(dir.name)}</span>`;
      item.addEventListener('click', () => browseTo(dir.path));
      fbBody.appendChild(item);
    }
    if(!res.dirs.length && !res.parent) {
      fbBody.innerHTML = '<div style="padding:16px;color:var(--fg2);text-align:center">з©ЇзЫЃељХ</div>';
    }
  } catch(e) { fbBody.innerHTML = `<div style="padding:16px;color:var(--red)">${escHtml(e.message)}</div>`; }
}
